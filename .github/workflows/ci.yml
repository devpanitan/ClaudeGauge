name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install deps
        run: npm ci

      # tauri-build needs icons/icon.ico to embed the Windows resource file.
      # We keep only the SVG source in git (icons are gitignored), so generate
      # them here — same step the release workflow uses.
      - name: Generate icons
        run: npm run tauri icon src-tauri/icons/icon.svg

      - name: Type-check frontend
        run: npx tsc --noEmit

      - name: Rust unit tests (data pipeline)
        run: cargo test --manifest-path src-tauri/Cargo.toml
